<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1400, initial-scale=1" />
<title>WC26 Predictor — Design Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; color: #0a0a0a; }
  ::-webkit-scrollbar { display: none; }
  button { font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="screens1.jsx"></script>
<script type="text/babel" src="screens2.jsx"></script>
<script type="text/babel" src="screens3.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ─────────────────────────── Tweaks panel ───────────────────────────
const THEMES = [
  { name: 'Electric violet', primary: '#6D28D9', primaryInk: '#4C1D95', accent: '#BEF264', accentInk: '#3F6212' },
  { name: 'Pitch green',     primary: '#0B5D3B', primaryInk: '#052E1D', accent: '#FBBF24', accentInk: '#78350F' },
  { name: 'Federation blue', primary: '#1E3A8A', primaryInk: '#172554', accent: '#F472B6', accentInk: '#831843' },
  { name: 'Fire red',        primary: '#DC2626', primaryInk: '#7F1D1D', accent: '#FDE047', accentInk: '#713F12' },
  { name: 'Graphite',        primary: '#18181B', primaryInk: '#000000', accent: '#A3E635', accentInk: '#365314' },
];

function TweaksPanel({ onClose, themeIdx, setThemeIdx }) {
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, zIndex: 9999,
      width: 280, background: '#fff', borderRadius: 16,
      boxShadow: '0 20px 60px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.05)',
      fontFamily: "'Inter Tight', system-ui, sans-serif",
      overflow: 'hidden',
    }}>
      <div style={{
        padding: '12px 14px', borderBottom: '1px solid #F0EEE8',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <div style={{ fontWeight: 700, fontSize: 13, letterSpacing: -0.1 }}>Tweaks</div>
        <button onClick={onClose} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          fontSize: 18, color: '#71717A', padding: 0, lineHeight: 1,
        }}>×</button>
      </div>
      <div style={{ padding: 14 }}>
        <div style={{
          fontSize: 10, fontWeight: 700, color: '#71717A',
          textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 8,
        }}>Color theme</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {THEMES.map((t, i) => {
            const active = themeIdx === i;
            return (
              <button key={t.name} onClick={() => setThemeIdx(i)} style={{
                display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px',
                background: active ? '#F4F3EE' : '#fff',
                border: active ? '1px solid #0a0a0a' : '1px solid #E7E5E0',
                borderRadius: 10, cursor: 'pointer', textAlign: 'left',
              }}>
                <div style={{ display: 'flex', gap: 3 }}>
                  <div style={{ width: 14, height: 14, background: t.primary, borderRadius: 4 }} />
                  <div style={{ width: 14, height: 14, background: t.accent, borderRadius: 4 }} />
                </div>
                <span style={{ flex: 1, fontSize: 12, fontWeight: active ? 700 : 500 }}>{t.name}</span>
                {active && <span style={{ color: t.primary, fontSize: 11, fontWeight: 700 }}>✓</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────── App ───────────────────────────
function App() {
  const [themeIdx, setThemeIdx] = useState(0);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // apply theme to TOKENS (mutable — T.primary reads via getter)
  useEffect(() => {
    const t = THEMES[themeIdx];
    Object.assign(window.TOKENS, {
      primary: t.primary, primaryInk: t.primaryInk,
      accent: t.accent, accentInk: t.accentInk,
    });
    // force rerender
    setForceKey(k => k + 1);
  }, [themeIdx]);
  const [forceKey, setForceKey] = useState(0);

  // tweaks bridge
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const screen = (label, ScreenComp, extraProps = {}) => (
    <DCArtboard label={label} width={402} height={874} style={{ background: '#F2F2F7', borderRadius: 48 }}>
      <IOSDevice {...extraProps}>
        <ScreenComp />
      </IOSDevice>
    </DCArtboard>
  );

  return (
    <div key={forceKey}>
      <DesignCanvas>
        {/* Intro */}
        <div style={{ padding: '20px 60px 40px', maxWidth: 820 }}>
          <div style={{
            fontFamily: "'Inter Tight', system-ui", fontSize: 12, fontWeight: 700,
            letterSpacing: 1.4, color: THEMES[themeIdx].primary, textTransform: 'uppercase',
          }}>Design exploration · v1</div>
          <div style={{
            fontFamily: "'Inter Tight', system-ui", fontSize: 48, fontWeight: 800,
            letterSpacing: -1.5, color: '#0a0a0a', lineHeight: 1, marginTop: 8,
          }}>WC26 Predictor</div>
          <div style={{
            marginTop: 12, fontSize: 15, color: '#3F3F46', maxWidth: 640,
            lineHeight: 1.55,
          }}>
            A private friends-only prediction app, designed mobile-first for
            World Cup 2026. Modern sporty aesthetic with bold typographic scores,
            crisp grid, and an electric accent for correct picks. Exact-score
            scoring with jackpot carry-over on all-miss matchdays. Turn
            <b> Tweaks</b> on to swap color themes.
          </div>

          {/* System strip */}
          <div style={{
            marginTop: 24, display: 'grid',
            gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, maxWidth: 720,
          }}>
            {[
              { l: 'Type', v: 'Inter Tight / Inter', d: 'Display · Body' },
              { l: 'Primary', v: THEMES[themeIdx].primary, swatch: true },
              { l: 'Accent', v: THEMES[themeIdx].accent, swatch: true },
              { l: 'Radii', v: '20 / 14 / 10', d: 'Pill 9999' },
            ].map(s => (
              <div key={s.l} style={{
                background: '#fff', borderRadius: 10,
                border: '1px solid #E7E5E0', padding: '10px 12px',
              }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: '#71717A', letterSpacing: 0.5, textTransform: 'uppercase' }}>{s.l}</div>
                {s.swatch ? (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 6 }}>
                    <div style={{ width: 18, height: 18, borderRadius: 5, background: s.v, border: '1px solid rgba(0,0,0,0.08)' }} />
                    <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, fontWeight: 700 }}>{s.v}</span>
                  </div>
                ) : (
                  <>
                    <div style={{ fontFamily: "'Inter Tight'", fontSize: 14, fontWeight: 700, marginTop: 2 }}>{s.v}</div>
                    {s.d && <div style={{ fontSize: 11, color: '#71717A', marginTop: 1 }}>{s.d}</div>}
                  </>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* Key flows */}
        <DCSection title="Core flows" subtitle="Mobile-first · iPhone · the five screens you'd touch every day">
          {screen('01 · Landing / Sign-in', LoginScreen)}
          {screen('02 · Home dashboard', HomeScreen)}
          {screen('03 · Tournament overview', TournamentScreen)}
          {screen('04 · Group-stage predictions', GroupPredictScreen)}
          {screen('05 · Matchday picks', MatchdayScreen)}
        </DCSection>

        {/* Prediction focus */}
        <DCSection title="Prediction interaction" subtitle="Stepper-based score entry · quick picks · crowd leanings">
          {screen('06 · Match drawer', MatchDrawerScreen)}
          <DCPostIt top={-40} left={-20} rotate={3} width={200}>
            Bottom-sheet drawer — big steppers within thumb reach, presets for common scores, shows how friends are leaning.
          </DCPostIt>
        </DCSection>

        {/* Standings & history */}
        <DCSection title="Ranking & history" subtitle="Motivational scanning + journey narrative">
          {screen('07 · Leaderboard', LeaderboardScreen)}
          {screen('08 · Fixtures / Results', FixturesScreen)}
          {screen('09 · My picks', MyPicksScreen)}
        </DCSection>

        {/* Settings + admin */}
        <DCSection title="Account & admin" subtitle="Profile settings (light) + admin tools for entering results (dark)">
          {screen('10 · Profile & settings', ProfileScreen)}
          {screen('11 · Admin · enter results', AdminScreen)}
          <DCPostIt top={-40} right={20} rotate={-2} width={200}>
            Admin uses dark chrome so it's clearly differentiated from player screens. Includes a "jackpot watch" when nobody hit the last match.
          </DCPostIt>
        </DCSection>

        {/* Component library */}
        <DCSection title="Component library" subtitle="Reusable building blocks across all screens">
          <DCArtboard width={820} height={640} style={{ background: '#fff', padding: 28, boxSizing: 'border-box' }}>
            <ComponentLibrary />
          </DCArtboard>
        </DCSection>

        {/* Responsive */}
        <DCSection title="Responsive" subtitle="Mobile-first · scales up to tablet and desktop without losing the social feel">
          <DCArtboard label="Tablet · 768×1024" width={768} height={1024}>
            <TabletView />
          </DCArtboard>
          <DCArtboard label="Desktop · 1280×800" width={1280} height={800}>
            <DesktopView />
          </DCArtboard>
        </DCSection>

        <div style={{ height: 60 }} />
      </DesignCanvas>

      {tweaksOpen && <TweaksPanel onClose={() => setTweaksOpen(false)} themeIdx={themeIdx} setThemeIdx={setThemeIdx} />}
    </div>
  );
}

// ─────────────────────────── Component library artboard ───────────────────────────
function ComponentLibrary() {
  return (
    <div style={{ fontFamily: "'Inter', system-ui" }}>
      <div style={{
        fontFamily: "'Inter Tight'", fontSize: 22, fontWeight: 800,
        letterSpacing: -0.5, marginBottom: 4,
      }}>Components</div>
      <div style={{ fontSize: 13, color: '#71717A', marginBottom: 24 }}>
        Building blocks used across screens. All respond to the Tweaks theme swap.
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
        {/* Status chips */}
        <ComponentBlock title="Status chips">
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            <StatusChip kind="upcoming" />
            <StatusChip kind="live" />
            <StatusChip kind="done" />
            <StatusChip kind="locked" />
            <StatusChip kind="open" />
            <StatusChip kind="hit" label="+3 EXACT" />
            <StatusChip kind="miss" />
            <StatusChip kind="jackpot" />
          </div>
        </ComponentBlock>

        {/* Score display */}
        <ComponentBlock title="Score display · tnum">
          <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
            <ScoreDisplay h={2} a={1} size={36} />
            <ScoreDisplay h={3} a={0} size={28} />
            <ScoreDisplay h={1} a={1} size={22} />
          </div>
        </ComponentBlock>

        {/* Steppers */}
        <ComponentBlock title="Prediction stepper">
          <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
            <Stepper value={2} onChange={()=>{}} accent />
            <Stepper value={null} onChange={()=>{}} />
          </div>
        </ComponentBlock>

        {/* Team discs */}
        <ComponentBlock title="Team discs (flag-alt)">
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {['ARG', 'BRA', 'FRA', 'ENG', 'GER', 'ESP', 'USA', 'CAN'].map(c => (
              <TeamDisc key={c} code={c} size={28} />
            ))}
          </div>
        </ComponentBlock>

        {/* Points chip */}
        <ComponentBlock title="Points chips">
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <PointsChip value={3} />
            <PointsChip value={3} big />
            <PointsChip value={0} />
          </div>
        </ComponentBlock>

        {/* Countdown */}
        <ComponentBlock title="Deadline countdown">
          <Countdown text="02:14:36" />
        </ComponentBlock>

        {/* Segmented */}
        <ComponentBlock title="Segmented control">
          <Segmented
            options={[
              { value: 'a', label: 'Overall' },
              { value: 'b', label: 'Groups' },
              { value: 'c', label: 'KO' },
            ]}
            value="a"
            onChange={()=>{}}
          />
        </ComponentBlock>

        {/* Avatars */}
        <ComponentBlock title="Avatars">
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            <Avatar name="Marco V." size={40} />
            <Avatar name="Ana K." size={36} />
            <Avatar name="Tomás R." size={32} />
            <Avatar name="You" size={28} />
          </div>
        </ComponentBlock>
      </div>
    </div>
  );
}

function ComponentBlock({ title, children }) {
  return (
    <div>
      <div style={{
        fontSize: 10, fontWeight: 700, color: '#71717A',
        letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10,
      }}>{title}</div>
      <div style={{
        background: '#FAFAF7', border: '1px solid #E7E5E0',
        borderRadius: 10, padding: 16, minHeight: 64,
        display: 'flex', alignItems: 'center',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────── Tablet + Desktop ───────────────────────────
function TabletView() {
  return (
    <div style={{ height: '100%', background: T.bg, padding: 28, boxSizing: 'border-box', fontFamily: T.body }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: T.primary, letterSpacing: 1.4, textTransform: 'uppercase' }}>The Usual Suspects</div>
          <div style={{ fontFamily: T.display, fontSize: 36, fontWeight: 800, letterSpacing: -1, color: T.ink }}>Dashboard</div>
        </div>
        <Avatar name="Alex Chen" size={44} color={T.primary} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 16 }}>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: T.ink3, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10 }}>Today's matches</div>
          <Card pad={0}>
            {TODAY_MATCHES.map((m, i) => (
              <div key={m.id} style={{ borderBottom: i < 2 ? `1px solid ${T.lineSoft}` : 'none' }}>
                <MatchRow match={m} showPrediction />
              </div>
            ))}
          </Card>

          <div style={{ fontSize: 12, fontWeight: 700, color: T.ink3, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10, marginTop: 20 }}>Groups</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
            {Object.entries(GROUPS).slice(0, 4).map(([k, codes]) => (
              <GroupMiniCard key={k} letter={k} codes={codes} />
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: T.ink3, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10 }}>Leaderboard</div>
          <Card pad={0}>
            {LEADERBOARD.slice(0, 6).map((row, i) => (
              <MiniLBRow key={row.name} row={row} isLast={i === 5} />
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
}

function DesktopView() {
  return (
    <div style={{ height: '100%', background: T.bg, display: 'flex', fontFamily: T.body }}>
      {/* Sidebar */}
      <div style={{
        width: 220, background: T.surface, borderRight: `1px solid ${T.line}`,
        padding: '24px 16px', display: 'flex', flexDirection: 'column', gap: 4,
      }}>
        <div style={{
          padding: '0 10px 16px', display: 'flex', alignItems: 'center', gap: 8,
          borderBottom: `1px solid ${T.lineSoft}`, marginBottom: 10,
        }}>
          <div style={{
            width: 28, height: 28, borderRadius: 8, background: T.primary,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontFamily: T.display, fontWeight: 900, fontSize: 13,
          }}>26</div>
          <div style={{ fontFamily: T.display, fontWeight: 800, fontSize: 15, letterSpacing: -0.3 }}>WC26 Predict</div>
        </div>
        {[
          { label: 'Dashboard', active: true },
          { label: 'Predict' },
          { label: 'Fixtures' },
          { label: 'Groups' },
          { label: 'Knockouts' },
          { label: 'Leaderboard' },
          { label: 'My picks' },
          { label: 'Settings' },
        ].map((n, i) => (
          <div key={i} style={{
            padding: '8px 12px', borderRadius: 8,
            background: n.active ? T.primary + '15' : 'transparent',
            color: n.active ? T.primary : T.ink2,
            fontSize: 13, fontWeight: n.active ? 700 : 500,
            cursor: 'pointer', fontFamily: T.display, letterSpacing: -0.1,
          }}>{n.label}</div>
        ))}
        <div style={{ flex: 1 }} />
        <div style={{
          padding: '10px 12px', background: T.surfaceAlt, borderRadius: 10,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <Avatar name="Alex" size={28} color={T.primary} />
          <div>
            <div style={{ fontSize: 12, fontWeight: 700 }}>Alex Chen</div>
            <div style={{ fontSize: 10, color: T.ink3 }}>Rank #4 · 12 pts</div>
          </div>
        </div>
      </div>

      {/* Main */}
      <div style={{ flex: 1, padding: 28, overflow: 'auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: T.primary, letterSpacing: 1.4, textTransform: 'uppercase' }}>Group stage · Matchday 3</div>
            <div style={{ fontFamily: T.display, fontSize: 32, fontWeight: 800, letterSpacing: -1, color: T.ink }}>Today's picks</div>
          </div>
          <div style={{
            background: T.ink, color: '#fff', borderRadius: 10, padding: '10px 16px',
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <div style={{ fontSize: 10, opacity: 0.6, fontWeight: 700, letterSpacing: 0.5, textTransform: 'uppercase' }}>Next lock</div>
            <div style={{ fontFamily: T.display, fontSize: 18, fontWeight: 800, fontFeatureSettings: '"tnum" 1' }}>02:14:36</div>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16 }}>
          <div>
            <div style={{
              background: T.live2, border: `1px solid ${T.live}33`,
              borderRadius: 10, padding: '10px 14px',
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12,
            }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: T.live, boxShadow: `0 0 0 4px ${T.live}22` }} />
              <div style={{ fontFamily: T.display, fontSize: 14, fontWeight: 700 }}>Playing now · USA 1–0 WAL · 67'</div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <BigPredictCard match={TODAY_MATCHES[1]} prediction={{ h: 2, a: 1 }} saved />
              <BigPredictCard match={TODAY_MATCHES[2]} prediction={null} />
            </div>
          </div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.ink3, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10 }}>Live ranking</div>
            <Card pad={0}>
              {LEADERBOARD.slice(0, 6).map((row, i) => (
                <MiniLBRow key={row.name} row={row} isLast={i === 5} />
              ))}
            </Card>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { TweaksPanel, App, ComponentLibrary, ComponentBlock, TabletView, DesktopView });

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
