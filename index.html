<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WC26 Prediction App</title>
  <meta name="description" content="WC26 Prediction App landing page" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #1f3b73, #0b1020 60%);
      color: #fff;
    }
    main {
      width: min(720px, 92vw);
      padding: 48px 28px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    h1 { font-size: clamp(2rem, 5vw, 4rem); margin: 0 0 12px; }
    p { font-size: 1.1rem; line-height: 1.6; opacity: 0.92; margin: 0 auto 20px; max-width: 56ch; }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ffd166;
      color: #111827;
      font-weight: 700;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">Coming Soon</div>
    <h1>WC26 Prediction App</h1>
    <p>A simple landing page for the World Cup 2026 prediction app. More soon.</p>
  </main>
</body>
</html>
